<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XMUI Courses 文件预览</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #eef4f7;
      --text: #162333;
      --muted: #667386;
      --line: #dce4ec;
      --accent: #0f766e;
      --accent-strong: #0a5f59;
      --folder: #255c99;
      --shadow: 0 16px 40px rgba(22, 35, 51, .12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(260px, 430px) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 22px;
      background: rgba(255, 255, 255, .94);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .search { position: relative; }

    .search input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 40px 0 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .16);
    }

    .search svg {
      position: absolute;
      right: 13px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .actions,
    .preview-actions,
    .notice-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .actions { justify-content: flex-end; }
    .preview-actions { justify-content: flex-end; }
    .notice-actions { justify-content: center; }

    .icon-button,
    .text-button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: .16s ease;
    }

    .icon-button { width: 38px; }

    .text-button {
      padding: 0 12px;
      font-size: 14px;
      white-space: nowrap;
    }

    .icon-button:hover,
    .text-button:hover,
    .file-row:hover,
    .folder-summary:hover {
      border-color: rgba(15, 118, 110, .42);
      background: #f0fbf8;
    }

    .icon-button svg,
    .text-button svg {
      width: 18px;
      height: 18px;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
    }

    .sidebar {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--surface);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .filters {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 11px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .chip.active {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .tree-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .file-tree {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(15, 118, 110, .6) #e6edf3;
    }

    .file-tree::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .file-tree::-webkit-scrollbar-track {
      background: #e6edf3;
      border-radius: 999px;
    }

    .file-tree::-webkit-scrollbar-thumb {
      background: rgba(15, 118, 110, .62);
      border: 3px solid #e6edf3;
      border-radius: 999px;
    }

    .file-tree::-webkit-scrollbar-thumb:hover {
      background: rgba(15, 118, 110, .86);
    }

    .folder {
      margin: 0 0 4px;
    }

    .folder-summary {
      list-style: none;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 7px 9px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: var(--text);
      user-select: none;
    }

    .folder-summary::-webkit-details-marker { display: none; }

    .folder-summary .chevron {
      width: 18px;
      height: 18px;
      color: var(--muted);
      transition: transform .16s ease;
    }

    details[open] > .folder-summary .chevron {
      transform: rotate(90deg);
    }

    .folder-name {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-count {
      color: var(--muted);
      font-size: 12px;
    }

    .folder-children {
      margin-left: 13px;
      padding-left: 10px;
      border-left: 1px solid var(--line);
    }

    .file-row {
      width: 100%;
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      padding: 7px 9px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      text-align: left;
      color: inherit;
    }

    .file-row.active {
      border-color: rgba(15, 118, 110, .42);
      background: #e6f7f3;
    }

    .folder-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-icon,
    .folder-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: var(--surface-soft);
      color: var(--accent);
    }

    .folder-icon { color: var(--folder); }
    .file-icon svg, .folder-icon svg { width: 16px; height: 16px; }

    .file-name {
      min-width: 0;
      display: block;
      font-size: 13px;
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .file-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      padding: 0 12px 12px;
    }

    .status strong { color: var(--text); }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .preview-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .preview-title { min-width: 0; }

    .preview-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .preview-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer {
      min-height: 0;
      padding: 18px;
      overflow: auto;
    }

    .viewer-frame {
      width: 100%;
      height: calc(100vh - 150px);
      min-height: 460px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .viewer-frame iframe,
    .viewer-frame video,
    .viewer-frame img {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #111827;
    }

    .viewer-frame img {
      object-fit: contain;
      background: #101828;
    }

    .text-preview {
      margin: 0;
      width: 100%;
      min-height: 100%;
      padding: 18px;
      overflow: auto;
      color: #182334;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
      font: 14px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .empty,
    .notice {
      max-width: 720px;
      margin: 72px auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .empty svg,
    .notice svg {
      width: 44px;
      height: 44px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .empty h2,
    .notice h2 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    .empty p,
    .notice p {
      margin: 0 auto 18px;
      color: var(--muted);
      max-width: 560px;
    }

    @media (max-width: 920px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }

      .search {
        grid-column: 1 / -1;
        order: 3;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 42vh minmax(0, 1fr);
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .preview-head { grid-template-columns: 1fr; }
      .preview-actions { justify-content: flex-start; }

      .viewer-frame {
        height: 62vh;
        min-height: 360px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        padding: 12px;
        gap: 10px;
      }

      .brand h1 { font-size: 18px; }
      .brand p { display: none; }

      .actions .text-button span,
      .preview-actions .text-button span,
      .notice-actions .text-button span {
        display: none;
      }

      .text-button {
        width: 38px;
        padding: 0;
      }

      .viewer { padding: 10px; }
    }
  </style>
</head>

          </div>
        </div>
      </section>
    </main>
  </div>

        .map((folder) => renderFolder(folder, 0))
        .join("");
      const rootFiles = tree.files.map(renderFile).join("");

      els.fileTree.innerHTML = files.length
        ? folders + rootFiles
        : '<div class="notice"><h2>没有匹配的文件</h2><p>换一个关键词或文件类型试试。</p></div>';

      els.status.innerHTML = files.length
        ? '显示 <strong>' + files.length + '</strong> 个文件，共 <strong>' + state.files.length + '</strong> 个；索引生成于 ' + new Date(GENERATED_AT).toLocaleString()
        : '没有匹配的文件，共 <strong>' + state.files.length + '</strong> 个';
    }

    function renderActions(file) {
      if (!file) {
        els.previewActions.innerHTML = "";
        return;
      }

      const raw = rawUrl(file.path);
      const local = localUrl(file.path);
      const git = githubUrl(file.path);
      const kind = fileKind(file.path);
      const actions = [
        '<a class="text-button primary" href="' + local + '" target="_blank" rel="noreferrer">' + icon("download") + '<span>下载</span></a>',
        '<a class="text-button" href="' + git + '" target="_blank" rel="noreferrer">' + icon("external") + '<span>GitHub</span></a>'
      ];
      if (kind === "office" || kind === "pdf") {
        actions.unshift('<a class="text-button" href="' + fallbackPreviewUrl(file.path) + '" target="_blank" rel="noreferrer">' + icon("external") + '<span>备用预览</span></a>');
      }
      els.previewActions.innerHTML = actions.join("");
    }

    function renderNotice(file, title, message, buttons = []) {
      const buttonHtml = buttons.map((button) =>
        '<a class="text-button' + (button.primary ? ' primary' : '') + '" href="' + button.href + '" target="_blank" rel="noreferrer">' + icon(button.icon || "external") + '<span>' + escapeHtml(button.label) + '</span></a>'
      ).join("");
      els.viewer.innerHTML = '<div class="notice">' + icon(fileKind(file.path) === "download" ? "download" : "file") + '<h2>' + escapeHtml(title) + '</h2><p>' + escapeHtml(message) + '</p><div class="notice-actions">' + buttonHtml + '</div></div>';
    }

    async function renderTextPreview(file) {
      const response = await fetch(rawUrl(file.path));
      if (!response.ok) throw new Error("读取文本失败：" + response.status);
      const text = await response.text();
      els.viewer.innerHTML = '<div class="viewer-frame"><pre class="text-preview">' + escapeHtml(text) + '</pre></div>';
    }

    async function selectFile(path) {
      const file = state.files.find((item) => item.path === path);
      if (!file) return;

      state.selectedPath = path;
      renderTree();
      renderActions(file);

      els.previewName.textContent = fileName(file.path);
      els.previewPath.textContent = file.path;
      const kind = fileKind(file.path);
      const raw = rawUrl(file.path);
      const local = localUrl(file.path);

      try {
        if (kind === "pdf") {
          els.viewer.innerHTML = '<div class="viewer-frame"><iframe title="' + escapeHtml(fileName(file.path)) + '" src="' + pdfViewerUrl(file.path) + '"></iframe></div>';
        } else if (kind === "office") {
          els.viewer.innerHTML = '<div class="viewer-frame"><iframe title="' + escapeHtml(fileName(file.path)) + '" src="' + officeUrl(file.path) + '"></iframe></div>';
        } else if (kind === "image") {
          els.viewer.innerHTML = '<div class="viewer-frame"><img alt="' + escapeHtml(fileName(file.path)) + '" src="' + local + '"></div>';
        } else if (kind === "video") {
          els.viewer.innerHTML = '<div class="viewer-frame"><video controls preload="metadata" src="' + local + '"></video></div>';
        } else if (kind === "text") {
          els.viewer.innerHTML = '<div class="notice">' + icon("text") + '<h2>正在读取文本...</h2><p>稍等片刻。</p></div>';
          await renderTextPreview(file);
        } else {
          renderNotice(file, "此类型暂不支持内嵌预览", "可以直接下载，也可以到 GitHub 查看文件详情。", [
            { label: "下载", href: raw, icon: "download", primary: true },
            { label: "GitHub", href: githubUrl(file.path), icon: "external" }
          ]);
        }
      } catch (error) {
        renderNotice(file, "预览加载失败", error.message || "在线预览服务暂时不可用，可以尝试下载或使用备用预览。", [
          { label: "下载", href: raw, icon: "download", primary: true },
          { label: "备用预览", href: fallbackPreviewUrl(file.path), icon: "external" }
        ]);
      }
    }

    async function refreshFromGitHub() {
      els.status.textContent = "正在从 GitHub 刷新文件列表...";
      const response = await fetch(API_TREE + "&t=" + Date.now());
      if (!response.ok) throw new Error("GitHub API 返回 " + response.status);
      const data = await response.json();
      state.files = (data.tree || [])
        .filter((item) => item.type === "blob" && !item.path.startsWith(".git") && fileName(item.path) !== "index.html")
        .map((item) => ({ path: item.path, size: item.size || 0 }))
        .sort((a, b) => a.path.localeCompare(b.path, "zh-Hans-CN"));
      state.selectedPath = "";
      els.previewName.textContent = "选择一个文件开始预览";
      els.previewPath.textContent = "已从 GitHub 刷新目录；页面仍不会自动打开文件。";
      els.previewActions.innerHTML = "";
      renderTree();
    }

    els.filters.addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      state.filter = button.dataset.filter;
      renderFilters();
      renderTree();
    });

    els.fileTree.addEventListener("click", (event) => {
      const row = event.target.closest("[data-path]");
      if (row) selectFile(row.dataset.path);
    });

    els.search.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderTree();
    });

    els.refresh.addEventListener("click", () => {
      refreshFromGitHub().catch((error) => {
        els.status.textContent = "在线刷新失败：" + (error.message || "请检查网络连接");
      });
    });

    renderFilters();
    renderTree();
  </script>
</body>
</html>
